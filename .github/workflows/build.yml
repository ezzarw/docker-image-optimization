on:
  #ngerun kalo ada push atau pull request dari branch main 
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

#apa yg dilakukan
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        #https://github.com/actions/checkout tapi versi yang keempat
      - uses: actions/checkout@v6

      - name: Ngesetup Docker buildx
        uses: docker/setup-buildx-action@v3
       
      - name: Build 
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/just_html_image:latest
